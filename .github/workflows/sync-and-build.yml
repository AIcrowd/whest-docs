name: Sync And Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - source-updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root workspace dependencies
        run: npm install

      - name: Sync source repositories
        run: npm run sync:sources
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.AICROWD_DOCS_SOURCE_TOKEN }}

      - name: Prepare aggregated content metadata
        run: npm run prepare:content

      - name: Build shared docs site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/site/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
